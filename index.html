<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EURIX - Mappatura Quadro Elettrico</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false; trackingMethod: best;">
      
      <a-marker type="barcode" value="0" smooth="true" smoothCount="10" smoothTolerance="0.05" smoothThreshold="5">
        
        <a-entity rotation="-90 0 0">
          
          <a-plane position="-1.833 2.416 0.1" width="1.833" height="0.416" material="color: #1e293b; shader: flat;">
            <a-text value="FM Uffici Linea 2" position="0 0 0.05" align="center" color="#0ea5e9" width="1.7" wrapCount="22"></a-text>
          </a-plane>

          <a-plane position="1.833 2.416 0.1" width="1.833" height="0.416" material="color: #27272a; shader: flat;">
            <a-text value="FM Sala Riunioni + Disimpegno" position="0 0 0.05" align="center" color="#f97316" width="1.7" wrapCount="25"></a-text>
          </a-plane>

          <a-circle position="0 0 0.05" radius="0.05" color="#ef4444"></a-circle>

        </a-entity>
      </a-marker>

      <a-entity camera look-controls="enabled: false" wasd-controls="enabled: false"></a-entity>
    </a-scene>
  </body>
</html>
